name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonar-macos:
    runs-on: macos-latest
    env:
      SONAR_SERVER_URL: https://sonarcloud.io
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud needs full history for blame/new-code detection

      - name: Install Neovim
        run: brew install neovim

      - name: Configure
        run: cmake --preset mac-coverage

      - name: Build (generate compile_commands.json)
        run: cmake --build build --target draxul draxul-tests draxul-rpc-fake

      - name: Run tests with coverage
        env:
          DRAXUL_RUN_SLOW_TESTS: "1"
          LLVM_PROFILE_FILE: "${{ github.workspace }}/build/coverage-%p.profraw"
        run: build/tests/draxul-tests

      - name: Merge profiles
        run: |
          # Child processes (e.g. nvim --embed) inherit LLVM_PROFILE_FILE and may
          # write corrupt profraw files (not compiled with -fprofile-instr-generate).
          # Filter to only valid instrumented profiles before merging.
          valid=()
          for f in "$GITHUB_WORKSPACE"/build/coverage-*.profraw; do
            if xcrun llvm-profdata show "$f" >/dev/null 2>&1; then
              valid+=("$f")
            else
              echo "Skipping corrupt profraw: $f" >&2
            fi
          done
          if [ "${#valid[@]}" -eq 0 ]; then
            echo "No valid profraw files found" >&2
            exit 1
          fi
          xcrun llvm-profdata merge "${valid[@]}" -o build/coverage.profdata

      - name: Export coverage (llvm-cov show)
        run: |
          xcrun llvm-cov show \
            build/tests/draxul-tests \
            -instr-profile=build/coverage.profdata \
            -ignore-filename-regex='(build/_deps|tests/)' \
            > build/coverage.txt

      - name: Check coverage report
        run: |
          echo "=== coverage.txt size ==="
          wc -c build/coverage.txt
          echo "=== first lines ==="
          head -20 build/coverage.txt

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.cfamily.llvm-cov.reportPath=${{ github.workspace }}/build/coverage.txt
            -Dsonar.verbose=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_SERVER_URL }}
