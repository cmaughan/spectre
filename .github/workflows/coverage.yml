name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  coverage-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: brew install neovim

      - name: Configure (coverage)
        run: cmake --preset mac-coverage

      - name: Build
        run: cmake --build build --target draxul-tests draxul-rpc-fake

      - name: Run tests
        env:
          DRAXUL_RUN_SLOW_TESTS: "1"
        run: |
          LLVM_PROFILE_FILE="$GITHUB_WORKSPACE/build/coverage-%m.profraw" \
            ctest --test-dir build -R draxul-tests --output-on-failure

      - name: Merge profiles
        run: |
          xcrun llvm-profdata merge \
            --failure-mode=warn \
            "$GITHUB_WORKSPACE"/build/coverage-*.profraw \
            -o build/coverage.profdata

      - name: Export lcov
        run: |
          xcrun llvm-cov export \
            build/tests/draxul-tests \
            --instr-profile=build/coverage.profdata \
            --format=lcov \
            --ignore-filename-regex='(build/_deps|tests/)' \
            > build/coverage.lcov

      - name: Commit coverage to db/
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp build/coverage.lcov db/coverage.lcov
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/coverage.lcov
          git diff --cached --quiet && echo "No coverage change" && exit 0
          git commit -m "Update db/coverage.lcov from CI"
          git push

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
