name: Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  coverage-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: brew install neovim

      - name: Configure (coverage)
        run: cmake --preset mac-coverage

      - name: Build
        run: cmake --build build --target draxul-tests draxul-rpc-fake

      - name: Run tests
        env:
          DRAXUL_RUN_SLOW_TESTS: "1"
        run: |
          LLVM_PROFILE_FILE="$GITHUB_WORKSPACE/build/coverage-%m.profraw" \
            ctest --test-dir build -R draxul-tests --output-on-failure

      - name: Merge profiles
        run: |
          xcrun llvm-profdata merge \
            --failure-mode=warn \
            "$GITHUB_WORKSPACE"/build/coverage-*.profraw \
            -o build/coverage.profdata

      - name: Export lcov
        run: |
          xcrun llvm-cov export \
            build/tests/draxul-tests \
            --instr-profile=build/coverage.profdata \
            --format=lcov \
            --ignore-filename-regex='(build/_deps|tests/)' \
            > build/coverage.lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-macos
          path: build/coverage.lcov
          if-no-files-found: error
          retention-days: 14

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
