name = "wide-char-scroll"
width = 800
height = 400
display_ppi = 192
font_path = "${SCENARIO_DIR}/../../fonts/JetBrainsMonoNerdFont-Regular.ttf"
font_size = 11
enable_ligatures = false
timeout_ms = 8000
settle_ms = 150
pixel_tolerance = 8
changed_pixels_threshold_pct = 0.10
nvim_args = ["-u", "NONE", "--noplugin", "-n"]
commands = ["set termguicolors", "set nonumber", "set signcolumn=no", "set laststatus=0", "set guicursor=a:blinkon0", "edit ${SCENARIO_DIR}/fixtures/wide-char-scroll.txt", "normal! gg", "normal! 5\u003cC-e\u003e"]
