name = "nanovg-demo"
width = 1200
height = 760
display_ppi = 192
font_path = "${SCENARIO_DIR}/../../fonts/JetBrainsMonoNerdFont-Regular.ttf"
font_size = 11
enable_ligatures = false
nanovg_demo = true
timeout_ms = 8000
settle_ms = 150
pixel_tolerance = 8
changed_pixels_threshold_pct = 0.10
nvim_args = ["-u", "NONE", "--noplugin", "-n"]
commands = ["set termguicolors", "set number", "set signcolumn=yes", "set laststatus=0", "set guicursor=a:blinkon0"]
