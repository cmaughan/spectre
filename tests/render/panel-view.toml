name = "panel-view"
width = 1200
height = 760
display_ppi = 192
font_path = "${SCENARIO_DIR}/../../fonts/JetBrainsMonoNerdFont-Regular.ttf"
font_size = 11
enable_ligatures = false
timeout_ms = 8000
settle_ms = 300
pixel_tolerance = 8
changed_pixels_threshold_pct = 0.20
debug_overlay = true
nvim_args = ["-u", "NONE", "--noplugin", "-n"]
commands = ["set termguicolors", "set number", "set signcolumn=yes", "set cursorline", "set laststatus=0", "set guicursor=a:blinkon0", "edit ${SCENARIO_DIR}/fixtures/basic-view.txt", "normal! 3G"]
