sonar.projectKey=cmaughan_Draxul
sonar.organization=cmaughan

sonar.sources=app,libs
sonar.tests=tests

# Exclude generated build artefacts and third-party FetchContent deps
sonar.exclusions=build/**

# Use compile_commands.json produced by CMake — no build-wrapper needed
# for Clang-based projects
sonar.cfamily.compile-commands=build/compile_commands.json

# Coverage report from llvm-cov show (text format — not llvm-cov export JSON)
sonar.cfamily.llvm-cov.reportPath=build/coverage.txt

